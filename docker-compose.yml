version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: syntrix_db
    environment:
      POSTGRES_USER: syntrix_user
      POSTGRES_PASSWORD: syntrix_password
      POSTGRES_DB: syntrix_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syntrix_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: syntrix_app
    environment:
      DATABASE_URL: postgresql+asyncpg://syntrix_user:syntrix_password@postgres:5432/syntrix_db
      DEBUG: "False"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
